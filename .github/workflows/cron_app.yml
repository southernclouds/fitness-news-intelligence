name: Daily Industry Trend Intelligence

on:
  schedule:
    # 💡 1日3回実行：日本時間の「朝7:05」「お昼15:05」「夜23:05」
    # 世界標準時（UTC）の 22:05、06:05、14:05 に相当します。
    # 正確に8時間おきに実行されるため、Streamlitのスリープ（12時間制限）を確実に回避できます。
    - cron: '5 22,6,14 * * *'
  workflow_dispatch: # 手動テストボタン

# 🔐 ロボットにGitHubへの書き込み権限を明示的に与える
permissions:
  contents: write

jobs:
  run-cron-app:
    runs-on: ubuntu-latest
    steps:
    - name: 1. コードをチェックアウト
      uses: actions/checkout@v4
      with:
        fetch-depth: 0 # 💡 Gitの履歴をすべて取得して競合エラーを防止

    - name: 2. Pythonの環境構築
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: 3. 必要な部品のインストール
      run: |
        pip install feedparser google-generativeai pandas

    # 🚀 Streamlitアプリを叩いて確実にアクティブ状態を維持する
    - name: 3.5. Streamlitアプリの起動確認（スリープ完全回避）
      run: |
        echo "Streamlitアプリへアクセスしてアクティブ状態を維持します..."
        # 💡 -L を外し、無限リダイレクトによるエラーを回避
        curl -s "https://fitness-news-intelligence-b4rnfhnrtrl4uaawetmid5.streamlit.app/" > /dev/null || true
        echo "アプリの完全起動・応答を待つため、30秒待機します..."
        sleep 30

    - name: 4. ニュース取得とAI分析の実行
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python cron_job_app.py

    - name: 5. 蓄積されたCSVデータをGitHubに保存
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        
        # 💡 1. リモートの最新状態（mainブランチ）を一度フェッチ
        git fetch origin main
        
        # 💡 2. Web上で手動削除された歴史に合わせるため、インデックスを強制同期
        # もしリモートにファイルがなければスルーします
        git checkout origin/main -- archive_app.csv || true
        
        # 💡 3. 今回Pythonが新しく生成した「スコア・コメント入りCSV」を強制追加
        git add -f archive_app.csv
        
        # 💡 4. 変更がある場合のみコミット
        if ! git diff --cached --quiet; then
          git commit -m "自動業界トレンドニュース蓄積（定期実行） [skip ci]"
          
          # 💡 5. リモートと歴史が衝突した場合、ローカル側（新しく作ったCSV）の変更を強制採用して合流する
          git pull --rebase -X theirs origin main || true
          
          # 💡 6. 強制的にリモートのmainブランチへプッシュ
          git push origin HEAD:main
        else
          echo "変更がないためスキップします。"
        fi

    - name: 6. 分析結果をメールで送信
      uses: dawidd6/action-send-mail@v4
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: southernclouds1976@gmail.com
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "【定期自動配信】業界トレンドニュース・インテリジェンス（BtoB・健康経営）"
        to: southernclouds1976@gmail.com
        from: ニュース自動配信システム <southernclouds1976@gmail.com>
        attachments: archive_app.csv
        html_body: |
          <h3>業界トレンド（BtoB・健康経営）ニュースの最新分析が完了しました。</h3>
          <p>現時点までの分析結果（CSVファイル）をメールに添付しています。</p>
          <p>詳細なグラフレポートや、AIによる戦略的示唆を確認する場合は、以下のWebダッシュボードへアクセスしてください。</p>
          <a href="https://fitness-news-intelligence-b4rnfhnrtrl4uaawetmid5.streamlit.app/">👉 業界トレンド・ダッシュボードを開く</a>
