name: Daily Industry Trend Intelligence

on:
  schedule:
    # 日本時間の朝7:05（世界標準時の22:05）に毎日実行
    - cron: '5 22 * * *'
  workflow_dispatch: # 手動テストボタン

jobs:
  run-cron-app:
    runs-on: ubuntu-latest
    steps:
    - name: 1. コードをチェックアウト
      uses: actions/checkout@v3

    - name: 2. Pythonの環境構築
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. 必要な部品のインストール
      run: |
        pip install feedparser google-generativeai pandas

    - name: 4. ニュース取得とAI分析の実行
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python cron_job_app.py

    - name: 5. 蓄積されたCSVデータをGitHubに保存
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add archive_app.csv
        git diff --cached --quiet || git commit -m "毎朝の業界トレンドニュース蓄積 [skip ci]"
        git push

    - name: 6. 分析結果をメールで送信
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: southernclouds1976@gmail.com
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "【毎朝自動配信】業界トレンドニュース・インテリジェンス（BtoB・健康経営）"
        to: southernclouds1976@gmail.com
        from: ニュース自動配信システム <southernclouds1976@gmail.com>
        attachments: archive_app.csv
        html_body: |
          <h3>今朝の業界トレンド（BtoB・健康経営）ニュースの分析が完了しました。</h3>
          <p>本日の分析結果（CSVファイル）をメールに添付しています。</p>
          <p>詳細なグラフレポートや、AIによる戦略的示唆を確認する場合は、以下のWebダッシュボードへアクセスしてください。</p>
          <a href="https://apppy-v79h69sc7q8asvhmgmdt8q.streamlit.app/">👉 業界トレンド・ダッシュボードを開く</a>
