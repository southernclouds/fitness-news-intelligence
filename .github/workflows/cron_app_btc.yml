name: Daily Industry Trend Intelligence BtoC

on:
  schedule:
    # 日本時間の朝7:10（世界標準時の22:10）に毎日実行
    - cron: '10 22 * * *'
  workflow_dispatch:

jobs:
  run-cron-app-btc:
    runs-on: ubuntu-latest
    steps:
    - name: 1. コードをチェックアウト
      uses: actions/checkout@v3

    - name: 2. Pythonの環境構築
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. 必要な部品のインストール
      run: |
        pip install feedparser google-generativeai pandas

    - name: 4. ニュース取得とAI分析の実行
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python cron_job_app_btc.py

    - name: 5. 蓄積されたCSVデータをGitHubに保存
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add archive_app_btc.csv
        git diff --cached --quiet || git commit -m "毎朝のBtoCトレンドニュース蓄積 [skip ci]"
        git push
