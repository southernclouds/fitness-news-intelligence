name: Daily Corporate News Intelligence

on:
  schedule:
    # 💡 1日3回実行：日本時間の「朝7:20」「お昼15:20」「夜23:20」
    # 世界標準時（UTC）の 22:20、06:20、14:20 に相当します。
    # 正確に8時間おきに実行されるため、Streamlitのスリープ（12時間制限）を確実に回避できます。
    - cron: '20 22,6,14 * * *'
  workflow_dispatch: # 手動でテスト実行するためのボタン

# 🔐 ロボットにGitHubへの書き込み権限を明示的に与える（exit code 128 対策）
permissions:
  contents: write

jobs:
  run-cron:
    runs-on: ubuntu-latest
    steps:
    - name: 1. コードをチェックアウト
      uses: actions/checkout@v3

    - name: 2. Pythonの環境構築
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. 必要な部品のインストール
      run: |
        pip install feedparser google-generativeai pandas openpyxl

    # 🚀 Streamlitアプリを叩いて確実にアクティブ状態を維持する
    - name: 3.5. Streamlitアプリの起動確認（スリープ完全回避）
      run: |
        echo "Streamlitアプリへアクセスしてアクティブ状態を維持します..."
        curl -sL "https://fitness-news-intelligence-ytze2h9pnro6pkbr6fe9zf.streamlit.app/" > /dev/null
        echo "アプリの完全起動・応答を待つため、30秒待機します..."
        sleep 30

    - name: 4. ニュース取得とAI分析の実行
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python cron_job.py

    - name: 5. 蓄積されたCSVデータをGitHubに保存
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add archive.csv
        # 💡 バッティング（競合）が起きても強制的に上書きして安全に前進する設定
        git fetch origin main
        git reset --mix origin/main
        git add archive.csv
        git diff --cached --quiet || git commit -m "自動ニュース蓄積（1日3回定期実行） [skip ci]"
        git push origin main

    - name: 6. 分析結果をメールで送信
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 465
        username: southernclouds1976@gmail.com
        password: ${{ secrets.EMAIL_PASSWORD }}
        subject: "【定期自動配信】契約法人ニュース・インテリジェンス"
        to: southernclouds1976@gmail.com
        from: ニュース自動配信システム <southernclouds1976@gmail.com>
        attachments: archive.csv
        html_body: |
          <h3>契約法人ニュース・インテリジェンスの最新分析が完了しました。</h3>
          <p>現時点までの分析結果（CSVファイル）をメールに添付しています。</p>
          <p>詳細なグラフレポートや、AIによる個別企業への戦略提案・アプローチ示唆を確認する場合は、以下のWebダッシュボードへアクセスしてください。</p>
          <a href="https://fitness-news-intelligence-ytze2h9pnro6pkbr6fe9zf.streamlit.app/">👉 契約法人インテリジェンス・ダッシュボードを開く</a>
