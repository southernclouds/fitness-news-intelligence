name: Daily Corporate News Intelligence

on:
  schedule:
    # 世界標準時の22:00（日本時間の翌朝7:00）に毎日実行
    - cron: '0 22 * * *'
  workflow_dispatch: # 手動でテスト実行するためのボタンを設置

jobs:
  run-cron:
    runs-on: ubuntu-latest
    steps:
    - name: 1. コードをチェックアウト
      uses: actions/checkout@v3

    - name: 2. Pythonの環境構築
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 3. 必要な部品のインストール
      run: |
        pip install feedparser google-generativeai pandas openpyxl

    - name: 4. ニュース取得とAI分析の実行
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python cron_job.py

    - name: 5. 蓄積されたCSVデータをGitHubに保存
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add archive.csv
        git pull --rebase origin main
        git diff --cached --quiet || git commit -m "毎朝の自動ニュース蓄積 [skip ci]"
        git push

    - name: 6. 分析結果をメールで送信
      uses: dawidd6/action-send-mail@v3
      with:
        # 送信に使用するメールサーバーの設定（Gmailの場合）
        server_address: smtp.gmail.com
        server_port: 465
        username: southernclouds1976@gmail.com
        password: ${{ secrets.EMAIL_PASSWORD }}
        
        # メールの内容設定
        subject: "【毎朝自動配信】契約法人ニュース・インテリジェンス"
        to: southernclouds1976@gmail.com
        from: ニュース自動配信システム <southernclouds1976@gmail.com>
        
        # 毎朝生成された archive.csv（最新の分析結果）をメールにそのまま添付
        attachments: archive.csv
        html_body: |
          <h3>今朝の契約法人ニュース・インテリジェンスの分析が完了しました。</h3>
          <p>本日の分析結果（CSVファイル）をメールに添付しています。</p>
          <p>詳細なグラフレポートや、AIによる個別企業への戦略提案・アプローチ示唆を確認する場合は、以下のWebダッシュボードへアクセスしてください。</p>
          <a href="https://appcorporatepy-gawyfpbjomsez9t6wc4npy.streamlit.app/">👉 契約法人インテリジェンス・ダッシュボードを開く</a>
